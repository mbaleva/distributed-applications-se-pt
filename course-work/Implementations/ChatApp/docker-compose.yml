version: "3.9"

services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: chatapp-sql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Your_strong_123
    ports:
      - "1433:1433"

  api:
    build: ./ChatApp.Api
    container_name: chatapp-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sql;User Id=sa;Password=Your_strong_123;TrustServerCertificate=True;
      - Jwt__Key=THIS_IS_DEMO_KEY_CHANGE_IN_PRODUCTION_1234567890
      - Jwt__Issuer=ChatApp
      - Jwt__Audience=ChatAppClient
    depends_on:
      - sql
    ports:
      - "5001:8080"

  mvc:
    build: ./ChatApp.Mvc
    container_name: chatapp-mvc
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ChatApiBaseUrl=http://api:8080/
    depends_on:
      - api
    ports:
      - "5002:8080"

